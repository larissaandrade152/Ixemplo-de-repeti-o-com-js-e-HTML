<DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="Contar()">Contar</button>

    <script>
        function Contar(){
            let numero = Number(prompt('Digite um número:'));
            while (numero > 0){
                alert(numero)
                numero--;
            }
        }
        </script>
    </body>
